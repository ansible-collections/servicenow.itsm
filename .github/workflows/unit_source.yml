name: Unit tests, dependencies from source
on:
  workflow_call:
    inputs:
      collection_pre_install:
        required: false
        type: string
        default: ""

jobs:
  unit_source:
    env:
      PY_COLORS: "1"
      source_directory: "./source"
      collection_base_dir: "/home/runner/.ansible/collections"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Oldest + newest controller Python per ansible-core (14 jobs).
        # https://docs.ansible.com/ansible/latest/reference_appendices/release_and_maintenance.html#ansible-core-support-matrix
        include:
          # ansible-core 2.16 — controller Python 3.10, 3.12
          - { ansible-version: stable-2.16, python-version: "3.10" }
          - { ansible-version: stable-2.16, python-version: "3.12" }
          # ansible-core 2.17 — controller Python 3.10, 3.12
          - { ansible-version: stable-2.17, python-version: "3.10" }
          - { ansible-version: stable-2.17, python-version: "3.12" }
          # ansible-core 2.18 — controller Python 3.11, 3.13
          - { ansible-version: stable-2.18, python-version: "3.11" }
          - { ansible-version: stable-2.18, python-version: "3.13" }
          # ansible-core 2.19 — controller Python 3.11, 3.13
          - { ansible-version: stable-2.19, python-version: "3.11" }
          - { ansible-version: stable-2.19, python-version: "3.13" }
          # ansible-core 2.20 — controller Python 3.12, 3.14
          - { ansible-version: stable-2.20, python-version: "3.12" }
          - { ansible-version: stable-2.20, python-version: "3.14" }
          # ansible-core 2.21 — controller Python 3.12, 3.14
          - { ansible-version: stable-2.21, python-version: "3.12" }
          - { ansible-version: stable-2.21, python-version: "3.14" }
          # devel (~2.22) — controller Python 3.13 to unknown https://github.com/ansible/ansible/blob/devel/pyproject.toml#L6
          - { ansible-version: devel, python-version: "3.13" }
    continue-on-error: ${{ matrix.ansible-version == 'devel' }}

    name: "py${{ matrix.python-version }} / ${{ matrix.ansible-version }}"
    steps:
      - name: Checkout the collection repository
        uses: ansible-network/github_actions/.github/actions/checkout_dependency@main
        with:
          path: ${{ env.source_directory }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: "0"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install ansible-core (${{ matrix.ansible-version }})
        run: python${{ matrix.python-version }} -m pip install https://github.com/ansible/ansible/archive/${{ matrix.ansible-version }}.tar.gz --disable-pip-version-check

      - name: Pre install collections dependencies first so the collection install does not
        run: ansible-galaxy collection install --pre ${{ inputs.collection_pre_install }} -p ${{ env.collection_base_dir }}
        if: inputs.collection_pre_install != ''

      - name: Read collection metadata from galaxy.yml
        id: identify
        uses: ansible-network/github_actions/.github/actions/identify_collection@main
        with:
          source_path: ${{ env.source_directory }}

      - name: Build and install the collection
        uses: ansible-network/github_actions/.github/actions/build_install_collection@main
        with:
          install_python_dependencies: true
          source_path: ${{ env.source_directory }}
          collection_path: ${{ steps.identify.outputs.collection_path }}
          tar_file: ${{ steps.identify.outputs.tar_file }}
          ansible_version: ${{ matrix.ansible-version }}

      - name: Print the ansible version
        run: ansible --version

      - name: Print the python dependencies
        run: python${{ matrix.python-version }} -m pip list

      - name: Run unit tests
        run: PYTHONPATH=$PYTHONPATH:${{ env.collection_base_dir }} python -m pytest tests/unit --showlocals
        working-directory: ${{ steps.identify.outputs.collection_path }}
