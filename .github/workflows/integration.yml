name: Integration tests, dependencies from source
on:
  pull_request_target:
    types: [opened, synchronize]
  push:
    branches:
      - main
      - "release-\\d.\\d"

permissions:
  contents: read

jobs:
  wait_for_approval:
    runs-on: ubuntu-latest
    environment: protected-snow
    steps:
      - name: Wait for run to be approved
        run: |
          echo "Run approved"

  integration:
    needs: [wait_for_approval]
    env:
      PY_COLORS: "1"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        versions:
          # Oldest + newest controller Python per ansible-core (14 jobs).
          # https://docs.ansible.com/ansible/latest/reference_appendices/release_and_maintenance.html#ansible-core-support-matrix
          # ansible-core 2.16 — controller Python 3.10, 3.12
          - { ansible: "stable-2.16", python: "3.10" }
          - { ansible: "stable-2.16", python: "3.12" }
          # ansible-core 2.17 — controller Python 3.10, 3.12
          - { ansible: "stable-2.17", python: "3.10" }
          - { ansible: "stable-2.17", python: "3.12" }
          # ansible-core 2.18 — controller Python 3.11, 3.13
          - { ansible: "stable-2.18", python: "3.11" }
          - { ansible: "stable-2.18", python: "3.13" }
          # ansible-core 2.19 — controller Python 3.11, 3.13
          - { ansible: "stable-2.19", python: "3.11" }
          - { ansible: "stable-2.19", python: "3.13" }
          # ansible-core 2.20 — controller Python 3.12, 3.14
          - { ansible: "stable-2.20", python: "3.12" }
          - { ansible: "stable-2.20", python: "3.14" }
          # ansible-core 2.21 — controller Python 3.12, 3.14
          - { ansible: "stable-2.21", python: "3.12" }
          - { ansible: "stable-2.21", python: "3.14" }
          # devel (~2.22) — controller Python 3.13 to unknown https://github.com/ansible/ansible/blob/devel/pyproject.toml#L6
          - { ansible: "devel", python: "3.13" }
        # servicenow-version is the SNOW release label (job names / matrix only).
        # Cross-product with versions above yields 42 jobs (14 ansible/python pairs × 3 SNOW).
        servicenow-version:
          - australia
          - yokohama
          - zurich
        # GitHub secrets use PDI instance IDs (SN_*_<id>) because instances upgrade
        # in place; when a new release ships, update the label here—not new secrets.
        include:
          - servicenow-version: australia
            sn_host_secret: SN_HOST_7056
            sn_username_secret: SN_USERNAME_7056
            sn_password_secret: SN_PASSWORD_7056
            sn_client_id_secret: SN_CLIENT_ID_7056
            sn_client_secret_secret: SN_CLIENT_SECRET_7056
            sn_api_key_secret: SN_API_KEY_7056
            sn_client_certificate_secret: SN_CLIENT_CERTIFICATE_7056
            sn_client_key_secret: SN_CLIENT_KEY_7056
          - servicenow-version: yokohama
            sn_host_secret: SN_HOST_7054
            sn_username_secret: SN_USERNAME_7054
            sn_password_secret: SN_PASSWORD_7054
            sn_client_id_secret: SN_CLIENT_ID_7054
            sn_client_secret_secret: SN_CLIENT_SECRET_7054
            sn_api_key_secret: SN_API_KEY_7054
            sn_client_certificate_secret: SN_CLIENT_CERTIFICATE_7054
            sn_client_key_secret: SN_CLIENT_KEY_7054
          - servicenow-version: zurich
            sn_host_secret: SN_HOST_7055
            sn_username_secret: SN_USERNAME_7055
            sn_password_secret: SN_PASSWORD_7055
            sn_client_id_secret: SN_CLIENT_ID_7055
            sn_client_secret_secret: SN_CLIENT_SECRET_7055
            sn_api_key_secret: SN_API_KEY_7055
            sn_client_certificate_secret: SN_CLIENT_CERTIFICATE_7055
            sn_client_key_secret: SN_CLIENT_KEY_7055
    continue-on-error: ${{ matrix.versions.ansible == 'devel' }}

    name: "py${{ matrix.versions.python }} / ${{ matrix.versions.ansible }} / ${{ matrix.servicenow-version }}"
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          allow-unsafe-pr-checkout: true

      - name: Set up Python ${{ matrix.versions.python }}
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.versions.python }}

      - name: Install ansible-core (${{ matrix.versions.ansible }})
        run: python${{ matrix.versions.python }} -m pip install https://github.com/ansible/ansible/archive/${{ matrix.versions.ansible }}.tar.gz --disable-pip-version-check

      - name: Install the collection
        run: ansible-galaxy collection install . --force

      - name: Print the ansible version
        run: ansible --version

      - name: Print the python dependencies
        run: python${{ matrix.versions.python }} -m pip freeze

      - name: Run integration tests
        env:
          SN_HOST: ${{ secrets[matrix.sn_host_secret] }}
          SN_USERNAME: ${{ secrets[matrix.sn_username_secret] }}
          SN_PASSWORD: ${{ secrets[matrix.sn_password_secret] }}
          SN_CLIENT_ID: ${{ secrets[matrix.sn_client_id_secret] }}
          SN_CLIENT_SECRET: ${{ secrets[matrix.sn_client_secret_secret] }}
          SN_API_KEY: ${{ secrets[matrix.sn_api_key_secret] }}
          SN_CLIENT_CERTIFICATE: ${{ secrets[matrix.sn_client_certificate_secret] }}
          SN_CLIENT_KEY: ${{ secrets[matrix.sn_client_key_secret] }}
        run: |
          echo "$SN_CLIENT_CERTIFICATE" > /tmp/SN_CLIENT_CERTIFICATE_FILE
          echo "$SN_CLIENT_KEY" > /tmp/SN_CLIENT_KEY_FILE
          make integration

  # This job does nothing and is only used for the branch protection
  # or multi-stage CI jobs, like making sure that all tests pass before
  # a publishing job is started.
  integration_all_green:
    if: always()
    needs:
      - integration
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
