name: Integration tests, dependencies from source
on:
  workflow_call:
    inputs:
      collection_pre_install:
        required: false
        type: string
        default: ""

jobs:
  wait_for_approval:
    runs-on: ubuntu-latest
    environment: protected-snow
    steps:
      - name: Wait for run to be approved
        run: |
          echo "Run approved"

  integration_source:
    needs: [wait_for_approval]
    env:
      PY_COLORS: "1"
      source_directory: "./source"
      collection_base_dir: "/home/runner/collections"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # because we have so many combinations of python/ansible-core/ServiceNow versions,
      # we only test the oldest and newest python versions for each ansible-core version.
      # This requires some GH matrix magic.
      matrix:
        # Placeholder axes excluded below; valid ansible-core × Python pairs are in include.
        # https://docs.ansible.com/ansible/latest/reference_appendices/release_and_maintenance.html#ansible-core-support-matrix
        ansible-version: [""]
        python-version: [""]
        # servicenow-version is the SNOW release label (job names / matrix only).
        # GitHub secrets use PDI instance IDs (SN_*_<id>) because instances upgrade
        # in place; when a new release ships, update the label here—not new secrets.
        servicenow-version:
          - "australia"
          - "yokohama"
          - "zurich"
        exclude:
          # This exclude entry removes junk jobs where ansible or python versions are empty.
          - ansible-version: ""
        include:
          # begin tested ServiceNow versions matrix
          # If you want to add a new ServiceNow version, add a new entry here.
          - servicenow-version: "australia"
            sn_host_secret: SN_HOST_7056
            sn_username_secret: SN_USERNAME_7056
            sn_password_secret: SN_PASSWORD_7056
            sn_client_id_secret: SN_CLIENT_ID_7056
            sn_client_secret_secret: SN_CLIENT_SECRET_7056
            sn_api_key_secret: SN_API_KEY_7056
            sn_client_certificate_secret: SN_CLIENT_CERTIFICATE_7056
            sn_client_key_secret: SN_CLIENT_KEY_7056
          - servicenow-version: "yokohama"
            sn_host_secret: SN_HOST_7054
            sn_username_secret: SN_USERNAME_7054
            sn_password_secret: SN_PASSWORD_7054
            sn_client_id_secret: SN_CLIENT_ID_7054
            sn_client_secret_secret: SN_CLIENT_SECRET_7054
            sn_api_key_secret: SN_API_KEY_7054
            sn_client_certificate_secret: SN_CLIENT_CERTIFICATE_7054
            sn_client_key_secret: SN_CLIENT_KEY_7054
          - servicenow-version: "zurich"
            sn_host_secret: SN_HOST_7055
            sn_username_secret: SN_USERNAME_7055
            sn_password_secret: SN_PASSWORD_7055
            sn_client_id_secret: SN_CLIENT_ID_7055
            sn_client_secret_secret: SN_CLIENT_SECRET_7055
            sn_api_key_secret: SN_API_KEY_7055
            sn_client_certificate_secret: SN_CLIENT_CERTIFICATE_7055
            sn_client_key_secret: SN_CLIENT_KEY_7055
          # end tested ServiceNow versions matrix

          # begin tested python/ansible-core matrix
          # If you want to add a new python/ansible-core version, add a new entry here.
          # ansible-core 2.15 — Python 3.9-3.11
          - ansible-version: stable-2.15
            python-version: "3.9"
          - ansible-version: stable-2.15
            python-version: "3.11"
          # ansible-core 2.16 — Python 3.10-3.12
          - ansible-version: stable-2.16
            python-version: "3.10"
          - ansible-version: stable-2.16
            python-version: "3.12"
          # ansible-core 2.17 — Python 3.10-3.12
          - ansible-version: stable-2.17
            python-version: "3.10"
          - ansible-version: stable-2.17
            python-version: "3.12"
          # ansible-core 2.18 — Python 3.11-3.13
          - ansible-version: stable-2.18
            python-version: "3.11"
          - ansible-version: stable-2.18
            python-version: "3.13"
          # ansible-core 2.19 — Python 3.11-3.13
          - ansible-version: stable-2.19
            python-version: "3.11"
          - ansible-version: stable-2.19
            python-version: "3.13"
          # ansible-core 2.20 — Python 3.12-3.14
          - ansible-version: stable-2.20
            python-version: "3.12"
          - ansible-version: stable-2.20
            python-version: "3.14"
          # ansible-core 2.21 — Python 3.12-3.14
          - ansible-version: stable-2.21
            python-version: "3.12"
          - ansible-version: stable-2.21
            python-version: "3.14"
          # devel (~2.22) — Python 3.12-3.14
          - ansible-version: devel
            python-version: "3.12"
          - ansible-version: devel
            python-version: "3.14"
    continue-on-error: ${{ matrix.ansible-version == 'devel' }}

    name: "py${{ matrix.python-version }} / ${{ matrix.ansible-version }} / ${{ matrix.servicenow-version }}"
    steps:
      - name: Checkout the collection repository
        uses: ansible-network/github_actions/.github/actions/checkout_dependency@main
        with:
          path: ${{ env.source_directory }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: "0"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install ansible-core (${{ matrix.ansible-version }})
        run: python${{ matrix.python-version }} -m pip install https://github.com/ansible/ansible/archive/${{ matrix.ansible-version }}.tar.gz --disable-pip-version-check

      - name: Pre install collections dependencies first so the collection install does not
        run: ansible-galaxy collection install --pre ${{ inputs.collection_pre_install }} -p ${{ env.collection_base_dir }}
        if: inputs.collection_pre_install != ''

      - name: Read collection metadata from galaxy.yml
        id: identify
        uses: ansible-network/github_actions/.github/actions/identify_collection@main
        with:
          source_path: ${{ env.source_directory }}

      - name: Build and install the collection
        uses: ansible-network/github_actions/.github/actions/build_install_collection@main
        with:
          install_python_dependencies: true
          source_path: ${{ env.source_directory }}
          collection_path: ${{ steps.identify.outputs.collection_path }}
          tar_file: ${{ steps.identify.outputs.tar_file }}
          ansible_version: ${{ matrix.ansible-version }}

      - name: Print the ansible version
        run: ansible --version

      - name: Print the python dependencies
        run: python${{ matrix.python-version }} -m pip list

      - name: Create integration_config.yml
        env:
          SN_HOST: ${{ secrets[matrix.sn_host_secret] }}
          SN_USERNAME: ${{ secrets[matrix.sn_username_secret] }}
          SN_PASSWORD: ${{ secrets[matrix.sn_password_secret] }}
          SN_CLIENT_ID: ${{ secrets[matrix.sn_client_id_secret] }}
          SN_CLIENT_SECRET: ${{ secrets[matrix.sn_client_secret_secret] }}
          SN_API_KEY: ${{ secrets[matrix.sn_api_key_secret] }}
          SN_CLIENT_CERTIFICATE: ${{ secrets[matrix.sn_client_certificate_secret] }}
          SN_CLIENT_KEY: ${{ secrets[matrix.sn_client_key_secret] }}
        run: |
          echo "$SN_CLIENT_CERTIFICATE" > /tmp/snow_client_cert.pem
          echo "$SN_CLIENT_KEY" > /tmp/snow_client_key.key
          touch ${{ steps.identify.outputs.collection_path }}/tests/integration/integration_config.yml
          echo "sn_host: '${{ env.SN_HOST }}'" >> ${{ steps.identify.outputs.collection_path }}/tests/integration/integration_config.yml
          echo "sn_username: '${{ env.SN_USERNAME }}'" >> ${{ steps.identify.outputs.collection_path }}/tests/integration/integration_config.yml
          echo "sn_password: '${{ env.SN_PASSWORD }}'" >> ${{ steps.identify.outputs.collection_path }}/tests/integration/integration_config.yml
          echo "sn_client_id: '${{ env.SN_CLIENT_ID }}'" >> ${{ steps.identify.outputs.collection_path }}/tests/integration/integration_config.yml
          echo "sn_client_secret: '${{ env.SN_CLIENT_SECRET }}'" >> ${{ steps.identify.outputs.collection_path }}/tests/integration/integration_config.yml
          echo "sn_api_key: '${{ env.SN_API_KEY }}'" >> ${{ steps.identify.outputs.collection_path }}/tests/integration/integration_config.yml
          echo "sn_client_certificate_file: '/tmp/snow_client_cert.pem'" >> ${{ steps.identify.outputs.collection_path }}/tests/integration/integration_config.yml
          echo "sn_client_key_file: '/tmp/snow_client_key.key'" >> ${{ steps.identify.outputs.collection_path }}/tests/integration/integration_config.yml
          echo "collection_base_dir: '${{ steps.identify.outputs.collection_path }}'" >> ${{ steps.identify.outputs.collection_path }}/tests/integration/integration_config.yml

      - name: Run integration tests
        env:
          SN_HOST: ${{ secrets[matrix.sn_host_secret] }}
          SN_USERNAME: ${{ secrets[matrix.sn_username_secret] }}
          SN_PASSWORD: ${{ secrets[matrix.sn_password_secret] }}
          SN_CLIENT_ID: ${{ secrets[matrix.sn_client_id_secret] }}
          SN_CLIENT_SECRET: ${{ secrets[matrix.sn_client_secret_secret] }}
          SN_API_KEY: ${{ secrets[matrix.sn_api_key_secret] }}
        run: ansible-test integration
        working-directory: ${{ steps.identify.outputs.collection_path }}
