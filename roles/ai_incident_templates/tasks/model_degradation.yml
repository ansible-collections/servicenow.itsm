---
- name: Create model degradation incident in ServiceNow
  servicenow.itsm.incident:
    state: new
    caller: "{{ ai_incident_caller }}"
    short_description: >-
      Model Degradation - {{ ai_incident_model_name | default('Unknown Model') }}
    description: |
      AI Factory Model Degradation Detected

      Model: {{ ai_incident_model_name | default('Unknown') }}
      Timestamp: {{ ansible_date_time.iso8601 | default('N/A') }}

      Error Details:
      {{ ai_incident_error_details | default('Model performance has degraded beyond acceptable thresholds.') }}

      Symptoms:
      - Increased inference latency beyond SLA thresholds
      - Model drift detected in output distributions
      - Error rate exceeding baseline

      Recommended Actions:
      1. Check inference endpoint health and latency metrics
      2. Review model drift scores in monitoring dashboard
      3. Verify input data pipeline for schema changes
      4. Consider rolling back to previous model version
      5. Check GPU memory utilization on serving nodes
      6. Review recent model deployment changes
    impact: "{{ ai_incident_model_degradation_impact }}"
    urgency: "{{ ai_incident_model_degradation_urgency }}"
    assignment_group: "{{ ai_incident_assignment_group }}"
    other:
      category: "{{ ai_incident_model_degradation_category }}"
      subcategory: "{{ ai_incident_model_degradation_subcategory }}"
      u_model_name: "{{ ai_incident_model_name | default(omit) }}"
  register: _model_incident_result
